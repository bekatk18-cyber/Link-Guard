<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LinkGuard — Fake Link Detector</title>
<style>
:root{
--bg1:#0f0c29;
--bg2:#302b63;
--bg3:#24243e;
--safe:#2ecc71;
--suspicious:#f1c40f;
--dangerous:#e74c3c;
--card:rgba(255,255,255,0.06);
--border:rgba(255,255,255,0.12);
--text:#f4f4f8;
--muted:#b7b7c9;
}
*{box-sizing:border-box;}
body{
margin:0;
min-height:100vh;
font-family:'Segoe UI', Roboto, -apple-system, sans-serif;
background:linear-gradient(135deg,var(--bg1),var(--bg2),var(--bg3));
background-size:200% 200%;
animation:gradientShift 16s ease infinite;
color:var(--text);
display:flex;
flex-direction:column;
align-items:center;
padding:40px 16px 80px;
}
@keyframes gradientShift{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}
header{ text-align:center; margin-bottom:32px; }
.logo{
display:inline-flex; align-items:center; gap:10px;
font-size:30px; font-weight:700; letter-spacing:0.5px;
}
.logo svg{ width:34px; height:34px; }
header p{ color:var(--muted); margin-top:8px; font-size:15px; }
.card{
width:100%; max-width:620px;
background:var(--card);
border:1px solid var(--border);
border-radius:20px;
padding:28px;
backdrop-filter:blur(14px);
box-shadow:0 20px 60px rgba(0,0,0,0.35);
}
.input-row{ display:flex; gap:10px; }
input[type="text"]{
flex:1;
padding:14px 16px;
border-radius:12px;
border:1px solid var(--border);
background:rgba(255,255,255,0.08);
color:var(--text);
font-size:15px;
outline:none;
transition:border 0.2s, box-shadow 0.2s;
}
input[type="text"]::placeholder{ color:#9494ad; }
input[type="text"]:focus{
border-color:#8e7cﬀ;
box-shadow:0 0 0 3px rgba(142,124,255,0.25);
}
button{
padding:14px 22px;
border:none;
border-radius:12px;
background:linear-gradient(135deg,#8e7cﬀ,#5c67f2);
color:#ﬀf;
font-weight:600;
font-size:15px;
cursor:pointer;
transition:transform 0.15s, opacity 0.15s;
}
button:hover{ transform:translateY(-1px); opacity:0.94; }
button:disabled{ opacity:0.6; cursor:not-allowed; transform:none; }
.hint{ color:var(--muted); font-size:12.5px; margin-top:10px; }
.error-box{
margin-top:14px; padding:12px 14px; border-radius:10px;
background:rgba(231,76,60,0.15); border:1px solid rgba(231,76,60,0.4);
color:#ﬀb3ab; font-size:14px; display:none;
}
/* Result panel */
#result{ margin-top:26px; display:none; }
.verdict-banner{
display:flex; align-items:center; gap:14px;
padding:18px 20px; border-radius:14px;
margin-bottom:18px;
border:1px solid var(--border);
}
.verdict-banner .icon{ font-size:30px; }
.verdict-banner .text h2{ margin:0; font-size:20px; }
.verdict-banner .text p{ margin:2px 0 0; color:var(--muted); font-size:13.5px; word-break:break-
all; }
.safe{ background:rgba(46,204,113,0.14); }
.safe .icon, .safe h2{ color:var(--safe); }
.suspicious{ background:rgba(241,196,15,0.14); }
.suspicious .icon, .suspicious h2{ color:var(--suspicious); }
.dangerous{ background:rgba(231,76,60,0.14); }
.dangerous .icon, .dangerous h2{ color:var(--dangerous); }
.score-wrap{ display:flex; align-items:center; gap:18px; margin-bottom:20px; }
.score-ring{ position:relative; width:92px; height:92px; flex-shrink:0; }
.score-ring svg{ transform:rotate(-90deg); }
.score-ring .bg{ fill:none; stroke:rgba(255,255,255,0.12); stroke-width:8; }
.score-ring .fg{ fill:none; stroke-width:8; stroke-linecap:round; transition:stroke-dashoﬀset 0.8s
ease; }
.score-ring .num{
position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
font-size:20px; font-weight:700;
}
.score-desc{ color:var(--muted); font-size:14px; line-height:1.5; }
.checks{ display:flex; flex-direction:column; gap:9px; }
.check-item{
display:flex; align-items:flex-start; gap:10px;
padding:11px 13px; border-radius:10px;
background:rgba(255,255,255,0.04);
border:1px solid var(--border);
font-size:13.5px;
}
.check-item .mark{ font-size:15px; margin-top:1px; }
.check-item.pass .mark{ color:var(--safe); }
.check-item.fail .mark{ color:var(--dangerous); }
.check-item .name{ font-weight:600; margin-bottom:2px; }
.check-item .msg{ color:var(--muted); }
.spinner{
width:20px; height:20px; border-radius:50%;
border:3px solid rgba(255,255,255,0.35);
border-top-color:#ﬀf;
animation:spin 0.7s linear infinite;
display:none;
}
@keyframes spin{ to{ transform:rotate(360deg); } }
.btn-content{ display:flex; align-items:center; gap:8px; }
footer{ margin-top:36px; color:var(--muted); font-size:12.5px; text-align:center; }
footer a{ color:#b3a8ﬀ; text-decoration:none; }
@media (max-width:480px){
.input-row{ flex-direction:column; }
button{ width:100%; }
}
</style>
</head>
<body>
<header>
<div class="logo">
<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
<path d="M12 2L3 6v6c0 5 3.8 9.4 9 10 5.2-.6 9-5 9-10V6l-9-4z" fill="url(#g)"/>
<path d="M9 12l2 2 4-4" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-
linejoin="round"/>
<defs>
<linearGradient id="g" x1="0" y1="0" x2="24" y2="24">
<stop oﬀset="0" stop-color="#8e7cﬀ"/>
<stop oﬀset="1" stop-color="#5c67f2"/>
</linearGradient>
</defs>
</svg>
LinkGuard
</div>
<p>Paste any link to check whether it's safe, suspicious, or dangerous.</p>
</header>
<div class="card">
<div class="input-row">
<input type="text" id="urlInput" placeholder="https://example.com/some-link"
autocomplete="oﬀ" />
<button id="scanBtn">
<span class="btn-content">
<span id="spinner" class="spinner"></span>
<span id="btnLabel">Scan Link</span>
</span>
</button>
</div>
<p class="hint">Works on any URL — no login, no data stored. Analysis runs locally against
known phishing patterns.</p>
<div class="error-box" id="errorBox"></div>
<div id="result">
<div class="verdict-banner" id="verdictBanner">
<div class="icon" id="verdictIcon">✓</div>
<div class="text">
<h2 id="verdictTitle">Safe</h2>
<p id="verdictUrl"></p>
</div>
</div>
<div class="score-wrap">
<div class="score-ring">
<svg width="92" height="92">
<circle class="bg" cx="46" cy="46" r="38"></circle>
<circle class="fg" id="scoreCircle" cx="46" cy="46" r="38"></circle>
</svg>
<div class="num" id="scoreNum">0</div>
</div>
<div class="score-desc" id="scoreDesc"></div>
</div>
<div class="checks" id="checksList"></div>
</div>
</div>
<footer>
Heuristic scan only — always use your own judgment for sensitive accounts.<br/>
<span id="apiStatus">Backend: checking…</span>
</footer>
<script>
const API_BASE = "https://link-guard-sheo.onrender.com";
const urlInput = document.getElementById('urlInput');
const scanBtn = document.getElementById('scanBtn');
const spinner = document.getElementById('spinner');
const btnLabel = document.getElementById('btnLabel');
const errorBox = document.getElementById('errorBox');
const result = document.getElementById('result');
const apiStatus = document.getElementById('apiStatus');
const CIRCUMFERENCE = 2 * Math.PI * 38;
function setLoading(isLoading){
scanBtn.disabled = isLoading;
spinner.style.display = isLoading ? 'inline-block' : 'none';
btnLabel.textContent = isLoading ? 'Scanning…' : 'Scan Link';
}
function showError(msg){
errorBox.textContent = msg;
errorBox.style.display = 'block';
result.style.display = 'none';
}
function hideError(){ errorBox.style.display = 'none'; }
function levelColor(level){
if(level === 'safe') return '#2ecc71';
if(level === 'suspicious') return '#f1c40f';
return '#e74c3c';
}
function levelIcon(level){
if(level === 'safe') return '✓';
if(level === 'suspicious') return '!';
return '✕';
}
function renderResult(data){
hideError();
result.style.display = 'block';
const banner = document.getElementById('verdictBanner');
banner.className = 'verdict-banner ' + data.level;
document.getElementById('verdictIcon').textContent = levelIcon(data.level);
document.getElementById('verdictTitle').textContent = data.verdict;
document.getElementById('verdictUrl').textContent = data.url;
document.getElementById('scoreNum').textContent = data.score;
const desc = {
safe: "This link doesn't show common phishing or scam patterns.",
suspicious: "This link has some red flags. Proceed carefully and avoid entering personal info.",
dangerous: "This link shows strong signs of a phishing or scam attempt. Avoid opening it."
};
document.getElementById('scoreDesc').textContent = desc[data.level] || '';
const circle = document.getElementById('scoreCircle');
circle.style.stroke = levelColor(data.level);
circle.style.strokeDasharray = CIRCUMFERENCE;
circle.style.strokeDashoﬀset = CIRCUMFERENCE;
requestAnimationFrame(() => {
const oﬀset = CIRCUMFERENCE - (data.score / 100) * CIRCUMFERENCE;
circle.style.strokeDashoﬀset = oﬀset;
});
const list = document.getElementById('checksList');
list.innerHTML = '';
data.checks.forEach(c => {
const item = document.createElement('div');
item.className = 'check-item ' + (c.passed ? 'pass' : 'fail');
item.innerHTML = `
<div class="mark">${c.passed ? '●' : '▲'}</div>
<div>
<div class="name">${c.name}</div>
<div class="msg">${c.message}</div>
</div>`;
list.appendChild(item);
});
}
async function scan(){
const url = urlInput.value.trim();
if(!url){
showError('Please paste a link first.');
return;
}
setLoading(true);
hideError();
try {
const res = await fetch(`${API_BASE}/api/analyze`, {
method: 'POST',
headers: { 'Content-Type': 'application/json' },
body: JSON.stringify({ url })
});
const data = await res.json();
if(!res.ok){
showError(data.error || 'Something went wrong.');
} else {
renderResult(data);
}
} catch(err){
} finally {
setLoading(false);
showError('Could not reach the LinkGuard backend. Is app.py running on port 5000?');
}
}
scanBtn.addEventListener('click', scan);
urlInput.addEventListener('keydown', e => { if(e.key === 'Enter') scan(); });
// Quick backend health check on load
fetch(`${API_BASE}/api/health`).then(r => {
apiStatus.textContent = r.ok ? 'Backend: connected ✅ ' : 'Backend: unreachable';
}).catch(() => { apiStatus.textContent = 'Backend: not running — start app.py'; });
</script>
</body>
</html>
